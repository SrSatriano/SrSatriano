<svg xmlns="http://www.w3.org/2000/svg" width="720" height="280" viewBox="0 0 720 280" role="img" aria-label="37 repositorios publicos por categoria">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="55%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#134e4a"/>
    </linearGradient>
    <linearGradient id="ringA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="720" height="280" rx="10" fill="url(#bg)" stroke="#1e293b" stroke-width="1"/>
  <text x="360" y="36" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI, system-ui, sans-serif" font-size="18" font-weight="700">37 repositorios publicos</text>
  <text x="360" y="58" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, system-ui, sans-serif" font-size="12">Ecossistema aberto: LHN, modulos OSS, portfolio e estudos</text>

  <g transform="translate(200 155)" filter="url(#glow)">
    <circle r="78" fill="none" stroke="url(#ringA)" stroke-width="22" stroke-dasharray="396 490" stroke-dashoffset="0" transform="rotate(-90)"/>
    <circle r="78" fill="none" stroke="#64748b" stroke-width="22" stroke-dasharray="54 490" stroke-dashoffset="-396" transform="rotate(-90)"/>
    <circle r="78" fill="none" stroke="#22d3ee" stroke-width="22" stroke-dasharray="25 490" stroke-dashoffset="-450" transform="rotate(-90)"/>
    <circle r="78" fill="none" stroke="#22c55e" stroke-width="22" stroke-dasharray="15 490" stroke-dashoffset="-475" transform="rotate(-90)"/>
    <circle r="58" fill="#050816"/>
    <text y="-6" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, system-ui, sans-serif" font-size="34" font-weight="800">37</text>
    <text y="19" text-anchor="middle" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="11">repos</text>
  </g>

  <g font-family="Segoe UI, system-ui, sans-serif" font-size="14">
    <rect x="340" y="88" width="340" height="36" rx="7" fill="#1e293b" fill-opacity="0.62"/>
    <circle cx="358" cy="106" r="6" fill="#38bdf8"/>
    <text x="374" y="110" fill="#e2e8f0">Modulos OSS por dominio</text>
    <text x="620" y="110" text-anchor="end" fill="#38bdf8" font-weight="700">30</text>
    <text x="668" y="110" text-anchor="end" fill="#94a3b8" font-size="12">81%</text>

    <rect x="340" y="132" width="340" height="36" rx="7" fill="#1e293b" fill-opacity="0.62"/>
    <circle cx="358" cy="150" r="6" fill="#64748b"/>
    <text x="374" y="154" fill="#e2e8f0">Arquivo e estudos</text>
    <text x="620" y="154" text-anchor="end" fill="#cbd5e1" font-weight="700">4</text>
    <text x="668" y="154" text-anchor="end" fill="#94a3b8" font-size="12">11%</text>

    <rect x="340" y="176" width="340" height="36" rx="7" fill="#1e293b" fill-opacity="0.62"/>
    <circle cx="358" cy="194" r="6" fill="#22d3ee"/>
    <text x="374" y="198" fill="#e2e8f0">Site e perfil</text>
    <text x="620" y="198" text-anchor="end" fill="#67e8f9" font-weight="700">2</text>
    <text x="668" y="198" text-anchor="end" fill="#94a3b8" font-size="12">5%</text>

    <rect x="340" y="220" width="340" height="36" rx="7" fill="#1e293b" fill-opacity="0.62"/>
    <circle cx="358" cy="238" r="6" fill="#22c55e"/>
    <text x="374" y="242" fill="#e2e8f0">LHN Sovereign V90</text>
    <text x="620" y="242" text-anchor="end" fill="#4ade80" font-weight="700">1</text>
    <text x="668" y="242" text-anchor="end" fill="#94a3b8" font-size="12">3%</text>
  </g>
</svg>
